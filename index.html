<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CT Cyber Solutions — Website Concepts Review</title>
    <style>
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --tab-height: 64px;
            --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        body {
            font-family: var(--font-sans);
            background: #0a0a0a;
            color: #ffffff;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        /* ── Top Tab Bar ── */
        .tab-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: var(--tab-height);
            background: #111111;
            border-bottom: 1px solid #2a2a2a;
            display: flex;
            align-items: center;
            z-index: 9999;
            padding: 0 16px;
            gap: 4px;
        }

        .tab-bar__logo {
            font-size: 13px;
            font-weight: 700;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-right: 24px;
            white-space: nowrap;
            padding: 0 8px;
        }

        .tab-bar__logo span {
            color: #2563EB;
        }

        .tab-btn {
            position: relative;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            border: 1px solid transparent;
            border-bottom: none;
            border-radius: 10px 10px 0 0;
            background: transparent;
            color: #888;
            font-family: var(--font-sans);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s ease;
            white-space: nowrap;
        }

        .tab-btn:hover {
            color: #ccc;
            background: #1a1a1a;
        }

        .tab-btn.active {
            background: #1e1e1e;
            color: #fff;
            border-color: #2a2a2a;
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            right: 0;
            height: 2px;
            border-radius: 2px 2px 0 0;
        }

        .tab-btn[data-tab="1"].active::after { background: #F97316; }
        .tab-btn[data-tab="2"].active::after { background: #2563EB; }
        .tab-btn[data-tab="3"].active::after { background: #06B6D4; }
        .tab-btn[data-tab="4"].active::after { background: #059669; }
        .tab-btn[data-tab="5"].active::after { background: #8B5CF6; }

        .tab-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .tab-btn[data-tab="1"] .tab-dot { background: #F97316; }
        .tab-btn[data-tab="2"] .tab-dot { background: #2563EB; }
        .tab-btn[data-tab="3"] .tab-dot { background: #06B6D4; }
        .tab-btn[data-tab="4"] .tab-dot { background: #059669; }
        .tab-btn[data-tab="5"] .tab-dot { background: #8B5CF6; }

        .tab-label-sub {
            font-size: 11px;
            color: #666;
            font-weight: 400;
        }

        .tab-btn.active .tab-label-sub {
            color: #999;
        }

        /* ── Viewport Toggle ── */
        .viewport-controls {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .viewport-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 8px;
            border: 1px solid #333;
            background: transparent;
            color: #666;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .viewport-btn:hover {
            border-color: #555;
            color: #aaa;
        }

        .viewport-btn.active {
            background: #2563EB;
            border-color: #2563EB;
            color: #fff;
        }

        .viewport-btn svg {
            width: 18px;
            height: 18px;
        }

        .viewport-label {
            font-size: 12px;
            color: #555;
            margin-right: 8px;
            font-weight: 500;
        }

        /* ── Iframe Container ── */
        .iframe-container {
            position: fixed;
            top: var(--tab-height);
            left: 0;
            right: 0;
            bottom: 0;
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow: hidden;
        }

        .iframe-wrapper {
            width: 100%;
            height: 100%;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                        box-shadow 0.4s ease,
                        border-radius 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .iframe-wrapper.mobile {
            width: 390px;
            height: calc(100vh - var(--tab-height) - 40px);
            margin-top: 20px;
            border-radius: 24px;
            box-shadow: 0 0 0 4px #222, 0 20px 60px rgba(0,0,0,0.5);
        }

        .iframe-wrapper.tablet {
            width: 768px;
            height: calc(100vh - var(--tab-height) - 40px);
            margin-top: 20px;
            border-radius: 16px;
            box-shadow: 0 0 0 3px #222, 0 20px 60px rgba(0,0,0,0.5);
        }

        .iframe-wrapper.desktop {
            width: 100%;
            height: 100%;
            border-radius: 0;
            box-shadow: none;
        }

        .tab-iframe {
            display: none;
            width: 100%;
            height: 100%;
            border: none;
            background: #fff;
        }

        .tab-iframe.active {
            display: block;
        }

        /* ── Responsive ── */
        @media (max-width: 900px) {
            .tab-bar {
                padding: 0 8px;
                gap: 2px;
            }
            .tab-bar__logo {
                display: none;
            }
            .tab-btn {
                padding: 8px 12px;
                font-size: 12px;
                gap: 6px;
            }
            .tab-label-sub {
                display: none;
            }
            .viewport-controls {
                gap: 4px;
            }
            .viewport-label {
                display: none;
            }
        }

        @media (max-width: 500px) {
            .tab-btn {
                padding: 8px 10px;
                font-size: 11px;
            }
            .viewport-controls {
                display: none;
            }
        }
    </style>
</head>
<body>

    <!-- Tab Bar -->
    <div class="tab-bar">
        <div class="tab-bar__logo">CT <span>Cyber</span> — Concepts</div>

        <button class="tab-btn active" data-tab="1" onclick="switchTab(1)">
            <span class="tab-dot"></span>
            <span>Concept 1</span>
            <span class="tab-label-sub">Dark Professional</span>
        </button>

        <button class="tab-btn" data-tab="2" onclick="switchTab(2)">
            <span class="tab-dot"></span>
            <span>Concept 2</span>
            <span class="tab-label-sub">Clean Corporate</span>
        </button>

        <button class="tab-btn" data-tab="3" onclick="switchTab(3)">
            <span class="tab-dot"></span>
            <span>Concept 3</span>
            <span class="tab-label-sub">Bold Cyber</span>
        </button>

        <span style="width:1px;height:28px;background:#333;margin:0 8px;flex-shrink:0;"></span>

        <button class="tab-btn" data-tab="4" onclick="switchTab(4)">
            <span class="tab-dot"></span>
            <span>Questionnaire</span>
            <span class="tab-label-sub">Your Answers</span>
        </button>

        <button class="tab-btn" data-tab="5" onclick="switchTab(5)">
            <span class="tab-dot"></span>
            <span>Proposal</span>
            <span class="tab-label-sub">Pricing & Terms</span>
        </button>

        <div class="viewport-controls">
            <span class="viewport-label">Preview</span>
            <button class="viewport-btn" data-viewport="mobile" onclick="setViewport('mobile')" title="Mobile (390px)">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="20" x="5" y="2" rx="2" ry="2"/><path d="M12 18h.01"/></svg>
            </button>
            <button class="viewport-btn" data-viewport="tablet" onclick="setViewport('tablet')" title="Tablet (768px)">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="20" x="3" y="2" rx="2" ry="2"/><path d="M12 18h.01"/></svg>
            </button>
            <button class="viewport-btn active" data-viewport="desktop" onclick="setViewport('desktop')" title="Desktop (Full)">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="14" x="2" y="3" rx="2"/><line x1="8" x2="16" y1="21" y2="21"/><line x1="12" x2="12" y1="17" y2="21"/></svg>
            </button>
        </div>
    </div>

    <!-- Iframe Container -->
    <div class="iframe-container">
        <div class="iframe-wrapper desktop" id="iframeWrapper">
            <iframe
                id="frame-1"
                class="tab-iframe active"
                src="iteration-1-dark-professional.html"
                title="Concept 1: Dark Professional"
                loading="lazy"
            ></iframe>
            <iframe
                id="frame-2"
                class="tab-iframe"
                src="iteration-2-clean-corporate.html"
                title="Concept 2: Clean Corporate"
                loading="lazy"
            ></iframe>
            <iframe
                id="frame-3"
                class="tab-iframe"
                src="iteration-3-bold-cyber.html"
                title="Concept 3: Bold Cyber"
                loading="lazy"
            ></iframe>
            <iframe
                id="frame-4"
                class="tab-iframe"
                src="client-questionnaire.html"
                title="Client Questionnaire"
                loading="lazy"
            ></iframe>
            <iframe
                id="frame-5"
                class="tab-iframe"
                src="proposal.html"
                title="Web Development Proposal"
                loading="lazy"
            ></iframe>
        </div>
    </div>

    <script>
        function switchTab(tabNum) {
            // Update tab buttons
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.tab-btn[data-tab="${tabNum}"]`).classList.add('active');

            // Update iframes
            document.querySelectorAll('.tab-iframe').forEach(frame => frame.classList.remove('active'));
            document.getElementById(`frame-${tabNum}`).classList.add('active');
        }

        function setViewport(mode) {
            const wrapper = document.getElementById('iframeWrapper');

            // Update button states
            document.querySelectorAll('.viewport-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.viewport-btn[data-viewport="${mode}"]`).classList.add('active');

            // Update wrapper class
            wrapper.className = `iframe-wrapper ${mode}`;
        }

        // Keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === '1' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); switchTab(1); }
            if (e.key === '2' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); switchTab(2); }
            if (e.key === '3' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); switchTab(3); }
            if (e.key === '4' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); switchTab(4); }
            if (e.key === '5' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); switchTab(5); }
        });
    </script>

</body>
</html>
